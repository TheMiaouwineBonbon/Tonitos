<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cartes SVG - Tonitos</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        background: #11100e;
      }

      .cards-page {
        width: min(1400px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      .print-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
        margin-top: 18px;
      }

      .print-card {
        border: 1px solid rgba(232, 194, 118, 0.26);
        border-radius: 8px;
        padding: 12px;
        background: rgba(21, 17, 14, 0.9);
      }

      .print-card img {
        display: block;
        width: 100%;
        border-radius: 8px;
      }

      .print-card a {
        display: block;
        margin-top: 10px;
        color: var(--amber);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="cards-page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Cartes générées</p>
          <h1>Tonitos</h1>
        </div>
        <a class="ghost-button" href="./index.html">Retour au jeu</a>
      </header>

      <section id="svg-list" class="print-grid" aria-label="Cartes SVG imprimables"></section>
    </main>

    <script type="module">
      const [cards, lands, spells] = await Promise.all([
        fetch("./data/cards.json").then((response) => response.json()),
        fetch("./data/lands.json").then((response) => response.json()),
        fetch("./data/spells.json").then((response) => response.json())
      ]);
      const list = document.querySelector("#svg-list");

      for (const card of [...cards, ...lands, ...spells]) {
        const file = `./Images/Cartes/${encodeURIComponent(card.name)}.svg`;
        const article = document.createElement("article");
        article.className = "print-card";
        article.innerHTML = `
          <img src="${file}" alt="${card.name}" />
          <a href="${file}" download="${card.name}.svg">Télécharger ${card.name}</a>
        `;
        list.append(article);
      }
    </script>
  </body>
</html>
