  <text x="70" y="902" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#4c3628">Il ne menace pas. Il arrive.</text>
  <text x="70" y="928" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#4c3628"></text>

